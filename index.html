<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<title>股票看板</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#0f1923;--bg-secondary:#1a2736;--bg-card:#1e2d3d;--bg-card-hover:#243447;--bg-modal:#1a2736;--text-primary:#e8edf2;--text-secondary:#8899aa;--text-muted:#5a6b7c;--green:#00d4aa;--green-bg:rgba(0,212,170,.12);--red:#ff4757;--red-bg:rgba(255,71,87,.12);--yellow:#ffc107;--yellow-bg:rgba(255,193,7,.12);--blue:#4da6ff;--blue-bg:rgba(77,166,255,.12);--border:#2a3a4a;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.3);--transition:all .2s ease}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-size:1.25rem;font-weight:700;letter-spacing:-.5px}
.header-right{display:flex;align-items:center;gap:8px}
.update-time{font-size:.8rem;color:var(--text-muted);font-variant-numeric:tabular-nums}
.btn-icon{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:6px;border-radius:var(--radius-sm);transition:var(--transition)}
.btn-icon:hover{background:var(--bg-card)}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border)}
.summary-item{text-align:center}
.summary-label{display:block;font-size:.75rem;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.summary-value{display:block;font-size:1.1rem;font-weight:700;font-variant-numeric:tabular-nums}
.filter-tabs{display:flex;gap:8px;padding:12px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 20px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-secondary);font-size:.875rem;cursor:pointer;white-space:nowrap;transition:var(--transition)}
.tab:hover{border-color:var(--text-secondary)}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.stock-grid{display:grid;grid-template-columns:1fr;gap:12px;padding:0 20px 20px}
.stock-card{background:var(--bg-card);border-radius:var(--radius);padding:16px;cursor:pointer;transition:var(--transition);border:1px solid transparent;position:relative;overflow:hidden}
.stock-card:hover{background:var(--bg-card-hover);border-color:var(--border);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-name{font-size:1rem;font-weight:600}
.card-code{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.card-price{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.card-change{font-size:.85rem;text-align:right;margin-top:2px;font-weight:600}
.card-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.metric{text-align:center}
.metric-label{display:block;font-size:.65rem;color:var(--text-muted);margin-bottom:2px;text-transform:uppercase}
.metric-value{display:block;font-size:.85rem;font-weight:600;font-variant-numeric:tabular-nums}
.card-indicators{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.indicator{display:flex;align-items:center;gap:6px;font-size:.75rem}
.indicator-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.indicator-name{color:var(--text-muted)}
.indicator-value{font-weight:600;font-variant-numeric:tabular-nums;margin-left:auto}
.card-alerts{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.alert-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600}
.alert-risk{background:var(--red-bg);color:var(--red)}
.alert-opportunity{background:var(--green-bg);color:var(--green)}
.alert-warning{background:var(--yellow-bg);color:var(--yellow)}
.alert-info{background:var(--blue-bg);color:var(--blue)}
.stock-card.up{border-left:3px solid var(--green)}
.stock-card.down{border-left:3px solid var(--red)}
.stock-card.flat{border-left:3px solid var(--text-muted)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-icon{font-size:4rem;margin-bottom:16px}
.empty-state h2{margin-bottom:8px;color:var(--text-primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-modal);border-radius:var(--radius);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);border:1px solid var(--border);animation:slideUp .25s ease}
.modal-large{max-width:720px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:1.1rem}
.btn-close{background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;padding:4px 8px;line-height:1}
.btn-close:hover{color:var(--text-primary)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:1rem;outline:none;transition:var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,166,255,.15)}
.form-group input::placeholder{color:var(--text-muted)}
.form-error{color:var(--red);font-size:.85rem;min-height:20px}
.search-hints{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);max-height:200px;overflow-y:auto;display:none;margin-top:4px}
.search-hints.visible{display:block}
.hint-item{padding:10px 14px;cursor:pointer;font-size:.9rem;border-bottom:1px solid var(--border);transition:var(--transition)}
.hint-item:last-child{border-bottom:none}
.hint-item:hover{background:var(--bg-card)}
.hint-code{font-weight:600;color:var(--blue);margin-right:8px}
.hint-name{color:var(--text-secondary)}
.btn{padding:10px 24px;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#3d96ef}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-card-hover)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#e6404f}
.btn-sm{padding:6px 14px;font-size:.8rem}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.setting-row select{width:auto;padding:6px 10px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.85rem}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:.85rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.detail-item{display:flex;justify-content:space-between;padding:6px 0}
.detail-label{color:var(--text-muted);font-size:.85rem}
.detail-value{font-weight:600;font-variant-numeric:tabular-nums}
.detail-alerts{display:flex;flex-direction:column;gap:8px}
.detail-alert-item{display:flex;align-items:flex-start;gap:8px;padding:10px;border-radius:var(--radius-sm);font-size:.85rem;line-height:1.4}
.detail-alert-item.risk{background:var(--red-bg)}
.detail-alert-item.opportunity{background:var(--green-bg)}
.detail-alert-item.warning{background:var(--yellow-bg)}
.detail-alert-item.info{background:var(--blue-bg)}
.detail-alert-icon{font-size:1.1rem;flex-shrink:0}
.detail-actions{display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.text-green{color:var(--green)}.text-red{color:var(--red)}.text-yellow{color:var(--yellow)}.text-blue{color:var(--blue)}.text-muted{color:var(--text-muted)}
.toast-container{position:fixed;top:70px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 20px;font-size:.85rem;box-shadow:var(--shadow);animation:slideIn .3s ease,fadeOut .3s ease 2.7s;max-width:320px}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--blue)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@media(min-width:640px){.stock-grid{grid-template-columns:repeat(2,1fr)}.summary-bar{gap:20px;padding:20px 24px}.stock-grid{padding:0 24px 24px}.card-metrics{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.stock-grid{grid-template-columns:repeat(3,1fr)}.summary-bar{padding:24px 32px}.stock-grid{padding:0 32px 32px;gap:16px}.filter-tabs{padding:16px 32px}}
@media(min-width:1440px){.stock-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:360px){html{font-size:14px}.summary-bar{grid-template-columns:repeat(2,1fr);gap:8px}.card-metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:320px){.summary-bar{grid-template-columns:repeat(2,1fr)}.app-header{padding:10px 12px}.logo{font-size:1rem}.stock-grid{padding:0 12px 12px;gap:8px}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
</style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-left"><h1 class="logo">📊 股票看板</h1></div>
    <div class="header-right">
      <span class="update-time" id="updateTime">--:--:--</span>
      <button class="btn-icon" id="btnRefresh" title="刷新">🔄</button>
      <button class="btn-icon" id="btnAdd" title="添加股票">➕</button>
      <button class="btn-icon" id="btnSettings" title="设置">⚙️</button>
    </div>
  </header>
  <main class="main-content">
    <section class="summary-bar">
      <div class="summary-item"><span class="summary-label">持仓数</span><span class="summary-value" id="totalValue">--</span></div>
      <div class="summary-item"><span class="summary-label">上涨</span><span class="summary-value" id="totalPnl">--</span></div>
      <div class="summary-item"><span class="summary-label">下跌</span><span class="summary-value" id="todayPnl">--</span></div>
      <div class="summary-item"><span class="summary-label">平盘</span><span class="summary-value" id="holdingsCount">--</span></div>
    </section>
    <section class="filter-tabs">
      <button class="tab active" data-filter="all">全部</button>
      <button class="tab" data-filter="alert">⚠️ 预警</button>
    </section>
    <section class="stock-grid" id="stockGrid"></section>
    <section class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📭</div>
      <h2>还没有持仓</h2>
      <p>点击右上角 ➕ 添加你的第一只股票</p>
    </section>
  </main>
</div>

<div class="modal-overlay" id="modalAdd" style="display:none;">
  <div class="modal">
    <div class="modal-header"><h2>添加股票</h2><button class="btn-close" id="btnCloseAdd">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>股票代码</label>
        <input type="text" id="inputCode" placeholder="输入6位代码，如 600519" autocomplete="off">
        <div class="search-hints" id="searchHints"></div>
      </div>
      <div class="form-error" id="formError"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btnCancelAdd">取消</button>
      <button class="btn btn-primary" id="btnConfirmAdd">添加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalDetail" style="display:none;">
  <div class="modal modal-large">
    <div class="modal-header"><h2 id="detailTitle">--</h2><button class="btn-close" id="btnCloseDetail">&times;</button></div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<div class="modal-overlay" id="modalSettings" style="display:none;">
  <div class="modal">
    <div class="modal-header"><h2>设置</h2><button class="btn-close" id="btnCloseSettings">&times;</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label>自动刷新间隔（秒）</label>
        <input type="number" id="inputInterval" value="30" min="5" max="300">
      </div>
      <div class="form-group">
        <label>数据管理</label>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary" id="btnExport" style="flex:1;">📤 导出</button>
          <button class="btn btn-secondary" id="btnImport" style="flex:1;">📥 导入</button>
        </div>
        <input type="file" id="fileImport" accept=".json" style="display:none">
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" id="btnSaveSettings">保存</button></div>
  </div>
</div>

<script src="js/api.js?v=3"></script>
<script src="js/indicators.js?v=3"></script>
<script src="js/risk-engine.js?v=3"></script>
<script src="js/storage.js?v=3"></script>
<script src="js/app.js?v=3"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){})}</script>
</body>
</html>
